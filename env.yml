name: tiny-liquid-benchmark
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy<2
  - pandas
  - pandas-stubs
  - scipy
  - scikit-learn

  # PyTorch
  - pytorch
  - torchvision
  - torchaudio

  # Notebook / exploration
  - jupyter
  - ipykernel
  - matplotlib
  - seaborn

  # Configs / CLI / quality of life
  - pyyaml
  - tqdm
  - rich
  - psutil

  - pip:
      - einops
      - ncps